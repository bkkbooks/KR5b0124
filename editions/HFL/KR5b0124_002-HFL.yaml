body:
  text: 許太史眞君圖傳卷下眞君與甘施二君歸郡周覽城邑適有一少年美風度衣冠甚偉通謁自稱姓愼禮貌勤恪應對捷給遽吿去眞君顧謂帬弟子曰適者非人乃老蛟之精故來見試其人體貌雖是而腥風襲人吾故愚之庶盡得其醜類耳眞君知年少乃老蛟之精蹟其所之乃在江滸化爲黃牛臥於沙蹟之上眞君乃翦紙化一黒牛徃之眞君令弟子蹟蛟精所之乃在郡城江滸化爲黃牛臥于沙蹟之上即今之黄牛洲眞君乃剪紙化黑牛去後又令施本潜持劒徃伺其關酣即揮之果中其左股牛奔入城南井中井今在上藍寺東南角故世號蛟井眞君遣符吏追蛟精至長沙賈誼井中岀化爲人入賈玉家先是玉妻以女居數歳生二子每春夏出舟秋重載歸是時忽徒還紿玉云彼劫傷股玉召醫眞君爲醫士謁玉召之不岀乃上堂叱曰江湖蛟精害物非一吾尋蹤至此豈容逃避速出乃見形遂揮兵誅之噀二子爲小蛟并誅之賈女幾變父毋吿遂免眞君謂賈玉曰蛟精所居其下即水今君舍下深不踰尺皆洪波也可速徒居母自陷溺玉舉家駭惶移居髙安其地不日陷爲淵潭深不可測今長沙昭潭是也眞君復還豫章而蛟精之餘黨甚盛慮眞君必誅之心不自安乃化而爲人散游城市因訪眞君弟子詭言曰僕家長安積世崇善逺聞賢師許君有神劒願聞其功弟子曰吾師神劔指天天裂指地地坼指星辰則失度指江河則逆流萬邪莫可當神聖之寳也又問抑有不能傷者乎曰惟不龍傷冬𤓰葫蘆耳蛟精以前言爲誠然乃盡化其屬爲冬𤓰葫蘆聮延枝蔓浮泛滿江擬流出境眞君晨興覺妖氛甚盛乃顧江中見蛟精所化即以劒授施岑使履水斬之黨屬茹連悉無噍類江流爲之變色眞君告弟子及郡城之父老曰此地爲浮州蛟螭所穴不有以鎭之後且復出爲患人莫之能制也乃役鬼神於牙城南井鑄鐡柱爲永久鎭浮之計眞君鑄鐡柱旣成聽其出井外數尺下施八索鈎鎖地脉眞君祝之曰鐡柱若亞其妖再興吾當復出鐵柱若正其妖求除由是水妖屏蹟城邑無虞復恐後世姦雄妄作故因鐵柱再埀記云地勝人心善應不出姦讎縱有興謀者終須不到頭其慮後世也深大率有如此者眞君以蛟蜃之屬有散入鄱陽潯陽界者慮其復還乃周行江湖以殄滅之至岧嶤山頂有蛟湖三所孔穴透大江通饒信遂誅其蛟魅立玉陽府開化靖太城府靖以鎭之鑄鐡符鎭鄱陽湖口杜其入路今在湖口縣上鍾石江中鑄鐵蓋覆廬陵玄潭制其藏藪仍壓以鐡符鎭以靈劒今有飛符嶺崇眞觀將軍王敦舉兵内向次于湖眞君與吳君及郭璞同徃謁之敦宴曰予夢一木破天如何眞君曰非佳兆也吳君曰木上破天未字也令璞筮之曰無成敦曰子夀幾何璞曰若舉事禍將不久若還武昌夀未可量敦怒曰君夀幾何璞曰盡今日日中即今武士擒璞以斬之眞君擲杯化鴿繞粱敦舉目失二君所在眞君與呉君游至金陵欲賃舟復回豫章而船主告以乏操舟者眞君曰爾等但瞑目安坐切母覘視吾自爲爾駕之舟人諾眞君召二龍挾舟而行經池陽以印印西岸之崖壁辟水恠而行今印文猶在許吳二君同乘龍舟凌空俄過廬山頂至于紫霄峯金闕洞眞君與吳君欲游洞中故其舟稍低抹林稍戞戞有聲舟人不能忍而竊窺之龍即捨舟於層岫之上折桅於深澗之下眞君謂舟人曰汝不聽吾言將何所歸乎舟人乃拜求濟度眞君教以服餌靈草遂不死之術終隱於此山今有鐡船峯并桅爲石墮在澗中眞君濟舊隱數十年間不以時事關意日與羣弟子講究眞詮精修至道作醉思仙歌又著八寳訓曰忠孝廉愼寬裕容忍忠則不欺孝則不悖廉而罔貪愼乃無失寬則得衆裕然有餘容而翕受忍則安舒鄕里化之皆遷善逺罪孝悌興行平時出處隨機應物不異常人但所居之地鳴鶴翔飛景雲旋繞而巳寧康二年甲戌眞君一百三十六歳八月朔有雲仗自天二仙乘輦下降導從甚都眞君向空迎拜二仙曰奉玉皇命賜子詔授九州都仙太史兼髙明大使賜紫綵羽袍玉膏金丹各一合眞君禮拜聽受訖一仙曰余乃玉眞上公崔子文一仙曰余乃元眞太卿瑕丘仲就告眞君冲舉之日復登雲車而去眞君召集門弟子與鄉曲耆老諭以升舉之期大食于眞君之庭日設宴飲共叙惜別且教以行善立功以𦤺神仙之㫖著靈劔子等書又與十一弟子各爲五言二韻勸誡詩十首以遺世及以大功如意丹方傳家弟子之不與上升者勸誡詩即今之一百二十靈籖也如意丹方亦行于世每歳尚有黄中齋食云八月十五日大營齋會徧召里人長少畢集至日中祥雲彌里音樂騰空羽蓋龍車從官兵衞仙童綵女導從崔瑕二詔使復降宣玉皇詔命云巳仰潛山司命官傳金丹於下界閉債封形迴子身及家口廚宅百好歸三天子急淨穢背土凌空左大力天丁與流金火鈴照辟中黄無或散慢眞君俯拜欽受眞君遵詔使玉眞上公之言以門弟子雖衆惟六人合從行餘各自有超舉之日不得偕行乃升龍車命陳勲時荷持冊前導周廣會亨驂御黄仁覽與其父族侍從盱烈與母部從仙眷四十二口拔宅同時升舉雞大亦随逐飛騰里人攀戀投地悲號不忍别去眞君乃留下修行鐘并石函聊爲異時之記也眞君有役夫許大聞將上升苦求隨行眞君以詔使告人數有定命不徇所請預期聽其與妻運米出西嶺及聞升舉乃愴惶奔歸推覆米車曁至撫膺望號眞君乃授以地仙之術夫婦偕隠于西山其來覆地復生旣隱不欲人識攺姓午復姓午見廟食于生米市翻車岡時人或有遇見之者蓋出沒不常焉眞君仙仗凌空有頃墜下藥臼車轂各一又墜一雞籠于宅之東南十餘里并䑕數枚墮地巳拖陽而不死意其曽竊食仙丹也後人或有見之者必爲瑞應馬升天後綵霞祥雲彌漫山谷百里之內異香經月不散初眞君自旌陽回奉蜀錦爲質信於諶姆姆製爲殿惟至是忽飛來游繞於故宅之上竟日復入雲霄眞君初與郭璞尋眞選勝經冝春樓梧山王長史之子朔迎欵敬至眞君授以仙術且云此地前對洞天俯臨袁水冝爲道院朔從之遂書靖字于壁而退及飛升時雲軿過其上遣二青衣告別朔舉家祈度眞君曰子軰仙骨未充乃飛仙茅一根俾植之久服可長生後王族各百齡今臨江玉虚觀有仙茅存焉玄都御史神烈吳仙眞君名猛宇世雲濮陽人性至孝以道法行于吳晉間嘗以羽扇晝豫章江水而渡晉寜康二年十月望奉天詔與弟子四人同時飛升潛惠彭仙眞君名抗字武陽仕晉爲尚書左丞師事眞君成道宋髙祖永初二年八月二十四日奉天詔舉家二十六口上升今龍興宗華觀是其故址也洪施時仙眞君名荷字道陽東海沐陽縣奉仙觀黄冠上士依棲師事眞君成道能役使鬼神驅剪邪魅及眞君冲升日命與陳勲執冊前導從龍車上升矣元通周仙眞君名廣字恵常廬陵人師事眞君遵行道法夙夜惟勤就宅西百餘歩築室以居今號宣詔福地太虚觀眞君冲舉日驂龍車上升精行甘仙眞君名戰字伯武豐城人師事眞君除害利物陳大建元年正月七日奉天詔駕麟車冲升今富州清都觀乃藏丹之故宅號飛簧觀勇悟施仙眞君名岑字太玉九江人勇健絶倫師事眞君成道晉寜康二年十月二十八日奉天詔冲升西嶺至德觀即其眺望水蛟之臺是也神恵曾仙眞君名亨字興國泗水人博學多能師事眞君授以要道靈符神方祕訣無不備悉後驂龍車同時升舉即今冨州眞陽觀是其遺蹟也正特陳仙眞君名勲字孝舉蜀川人博學洽聞昔眞君任旌陽日付以吏職後引爲門弟子託以腹心典經籍守丹鑪眞君冲舉日命與時荷執冊前導焉和靖旴仙眞君名烈字道微少孤事毋孝毋乃眞君孟姊也眞君以孀居築室于宅西居之毋子得道並受詔命部從眞君仙眷四十二口上升冲道黄仙眞君名仁覽字紫庭髙安人任青州從事單騎之官眞君以子妻之父輔字萬石舉孝亷任御史同師事眞君得道舉家三十二口從眞君龍車升天普惠鍾離仙眞君名嘉字公陽眞君仲姊之子少喪父母眞君授以至道晉寧康二年十月十五日奉天詔冲升今新建縣象牙山丹陵觀是其故址也洞眞胡天師名惠超字拔俗不知何許人也居豫章西山洪井眞君授以延生錬化超三元九紀之道唐長安三年二月望冲升今龍興玄妙觀是其伐樟樹精去處也許太史眞君圖傳卷下
