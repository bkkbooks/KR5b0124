front:
  text: 許太史真君圖傳卷上國九
  hash: sha256:f96bc03b3f8352c14307f26fac75a877b3a549a9f0c40df63faa46a148871971
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0124_HFL_001-001a, image: hfl/0197/0197-042.png}
body:
  text: 玉陛錫詔晉孝武帝寧康二年甲戌歲八月朔且有雲仗自天而下二仙乘輦導從甚都降于真君之庭真君降階迎拜二仙曰奉玉皇命賜子詔真君俯伏以聽乃宣詔曰上詔學仙童子許遜卿在多劫之前積修至道勤苦備悉經緯逾深萬法千門罔不師歷救災拔難除害蕩妖功濟生靈名髙玉籍衆真推仰宜有甄升可授九州都仙太史髙明大使賜紫綵羽袍瓊旌寶節玉膏金丹各一合詔至奉行真君再拜登階受詔一仙曰豫乃玉真上公崔子文一仙曰豫乃元真大卿瑕丘仲言畢揖真君坐告以沖升之日遂乘雲車而去玉陛再詔晉孝武帝寧康二年甲戌歲八月望日至于日中世人遙聞空中音樂之聲祥雲彌望須臾漸至真君之庭羽蓋龍車從官兵衛仙童綵女前從導從紅雲紫氣舒布環繞前二詔使再至真君降階拜迎二仙復宣詔曰上詔學仙童子許遜脫子前世貪殺匿不祀祖先之罪録子今生呪水行符治病罰惡馘毒之功巳仰潛山司命官傳金丹於下界閉債封形回子身及家口廚宅百好歸三天子急淨穢背土凌空左大力天丁與右流金火鈴大將照辟中黃無或散慢詔至奉行仍封逺祖由玉虛僕射曽祖琰太微兵衛大夫祖玉太極把業録籍與者父肅中嶽仙官賜所居宅曰仙曹左府詔使曰鄉門弟子唯六人合從龍車同時上升言畢亦升天而去真君聖誥混元始祖一氣分真多劫之前積修至道勤苦備悉經緯逾深萬法千門罔不師歷救災拔難除害蕩妖功濟生靈名髙玉籍衆真推仰冝有甄升大慈大願大孝大仁九州都仙太史髙明大使雷霆泰省天樞伏魔上相至道玄應神功妙濟掌九天司職太一定命注生真君三天按察都檢校溥奏諫議大夫天醫大帝度人祖師淨明溥化天尊九州都仙太史髙明大使至道玄應神功妙濟真君姓許名遜字敬之曽祖琰祖玉父肅世為許昌人髙節不仕乃頴陽由之後也父漢末避地於豫章之南昌因家焉初母夫人夢金鳯㗸珠墮於掌中玩而吞之及覺腹動因是有孕而真君降生焉時吳赤鳥二年正月二十八日也真君生而頴悟少小通疏與物無忤嘗從獵射一麀鹿中之子墮鹿母猶顧砥之未竟而斃因是惻然感悟即棄折弓矢學道也真君刻意為學博通經史明天文地理音律五行經緯之書尢嗜神仙修鍊之術遍參歷考悉究玄微焉真君聞西安吳世雲得至人丁義神方南海鮑靖祕法及天降白雲符遂往師之世雲靈感玄會若契宿因悉以祕要付授如今之垂世如意大丹乃丁義神方之一也西安今寧州世雲仕吳為西安令因家焉今去州六十里有西平靖吳仙觀即其故宅也真君與郭璞訪求名山為棲真之地得逍遙山金氏宅謂大合仙格乃同謁金公璞白曰許君欲置一舍為修餗之地故上謁公答曰許君若誠有意當并置莊産為薪水資真君曰雖蒙傾蓋受之無名願聞所需多寡惟命公曰大丈夫一言道合身命猶以許人况外物乎乃取一大錢中破之各牧其半為劵焉真君居金氏宅日以修鋉為事不求聞逹鄉黨化其孝友交遊服其德義人有餽遺苟非其義一介不取嘗有售鐡燈檠者因夜然燈有漆剝處視之乃金也翼日訪元主還之真君道譽日著郡舉孝廉不就朝廷纍加禮命不得巳乃以晉大康元年起為蜀郡旌陽令時年四十二視事之初誡胥吏去貪鄙除煩苛脫囚縶悉開諭以道吏民悅服咸願自新其教民忠孝慈仁忍愼勤欽為先令秀民有德望者相與勸率故爭競日消至於無訟時胡詹二典押為之掌案聽政焉今廟食為神也真君未任縣之先歲飢民無以輪租郡邑繩以法率多流移暨涖事日乃以靈丹點瓦礫化黃金令人潛瘞於縣之後圃一日籍民之未輸者咸造于庭使吏詰貴之令服力役於後圃民鑊地獲金得以輪納故免逃竄之憂悉按堵鄰境流移之民慕其德惠來依附者甚衆遂至縣邑户口增衍人物冨庶焉郡中屬歲大疫民死者十有七八真君乃以所得神方拯治之凡符呪所及皆登時而愈至於沈痾之疾亦無不痊者郡中疫民既活救濟之道傳聞他郡病者相繼而至日以千計於是標竹郭外十里之江置符其中俾就竹下飲水皆瘥其悼耄羸疾不能自至者汲歸飲之亦獲痊愈故蜀民謡曰民無盜竊吏無姦欺我君活人病無能為真君任旌陽既久知晉室將亂乃棄官東歸蜀民感其德化無計借留所在立生柌家傳盡像敬事如神明為啓行之日嬴糧而送者蔽野有至千里始還者有隨至其宅願服役而不返者乃於宅東之隙地結菱以居其戕如營壘悉攺氏挨以從真君之姓故至今其地號許家營焉其遺愛及民有如此者真君嘗至新吳憩于柏林忽有女童五人各持寶劔來獻異而受之既而偕至真君宅日以擊劔自娛人莫能測真君知其劒仙常禮遇之卒獲神劒之用飛升後五童隱于手植柏下因號柏樹仙童新吳今有柏林觀存焉真君與吳真君遊嵩陽聞金陵丹陽縣黃堂靖有女師諶姆多道術同往師之姆曰昔孝悌王自上清下降兖州曲阜縣蘭公家留下金丹寶經銅符鐡劵謂公曰後晉代當有神仙許遜傳吾此道命公轉以授吾使掌之以俟子積有年矣今當授子乃登壇依科盟授并正一斬邪之法三五飛步之術悉以傳付焉二君前受諶姆道法禮謝訖辭行真君方心期每歲必來謁姆姆覺之曰子勿來吾即返帝鄉矣乃取香茅一根望南擲之曰子歸認茅落處立吾祠嵗秋一至足矣二君還首訪飛茅之迹於所居之南四十餘里得之巳叢生矣遂建祠宇亦以黃堂名之今號曰黃堂隆道宫每歲仲秋之三日必往朝謁焉真君自嵩陽回訪諶姆飛茅之迹經過路傍偶見陂水清徹為之少憩今清陂村有憩真靖為觀是其處也又見鄉民盛烹宰以祀神且相詫曰祭或不腆則神怒降禍矣真君曰怪祟敢爾耶乃夜宿於逆旅召烈風迅雷伐之技其林木明日告其里人曰妖社巳驅毋用祭也今其地有廢社鄉民不復祭祀矣真君尋訪飛茅經過之地見鄉民負簷遠汲者滿道老幼勞苦乃以杖剌社前涸澤湧泉以濟之雖旱不竭今大澤村紫陽靖之石井是也真君嘗登龍城之山巔指山腰之泉罅曰是必有異物藏于其中後將為妖孽以害生民遂卓劔運法建立壇靖以鎮之今每年仙馭朝諶姆則憩于此號龍城觀也真君渡小蜀江即今之黃湖口抵江干之肆主人朱氏雖貧而迎接能盡禮敬真君乃戲盡一松于壁而去其家即日市利加倍後江漲潰堤市舍俱漂惟松壁不壞也今名松湖市見有朱土地廟食焉真君嘗鍊神丹於艾城之黃龍山山湫有蛟魅聚淵藪作洪水欲漂丹室於是真君遣神兵擒之釘于石壁今釘蛟石具在焉真君神丹既成乃祭于幕阜山葛仙公之石室真君至修川愛其湍急而味堅取神劔磨于澗傍之石即今號梅山旌陽觀真君渡水登秀峯為壇於峯頂以醮謝上帝乃服仙丹今號旌陽山溪南有吳仙觀即是吳真君故居也真君造吳君之宅過西安縣即今寧州社伯出謁乃詰其地分有妖孽為民害者其神匿之而不告焉真君行過一小廟五神人迎謁而告曰此地久有蛟孽毒害生民知仙君來此故往鄂渚藏避矣後將復還願為斯民除之廟神姓毛兄弟五人今曰協佑廟在州東四百步地也真君如廟神之言躡迹追蛟至鄂渚路逢三老人詢其蛟孽蹤穴所在指曰見伏于前橋下故真君至橋側仗劒叱之蛟驚奔入大江匿深淵乃勑吏兵驅之蛟從上流奔出遂誅之三老人即普應三王廟食其地今有伏龍橋上下龍口也真君怒西安杜伯匿蛟而不職錮其祠門止其享杞令居民事姓毛之小廟今寧州城隍廟正門常閉開則邑有災協佑廟食甚盛真君還郡城曰此地水陸衝要人物繁夥豈無分合神仙之人試以靈丹數粒雜他藥貨之令其信緣而取竟無一人遇者真君吁嘆仙才之難得也真君聞新吳有蛟為孽因持寶劒捕逐之經今仙遊觀之地蛟懼竄入溪穴即今藏溪也真君乃以巨石書符及作鎮蛟文以鎮之文石尚存于今之奉新縣西十里延真觀院是也海昏之上遼有一巨蛇據山為穴吐氣成雲亘四十里吞吸人物大為生民害真君聞之乃登北嶺即今會仙峯驗之果見毒氣漲空乃集弟子將往誅之初入其界遠近居民千百人競來懇訴真君惻然曰世運周流際此厄食生民何罪乃受其災吾之此來正為是事誓不與此蛇俱生也當為汝曹除之真君羣弟子既集亦同勸請誅蛇真君曰須時至乃可於是卓劔于地對天默禱良久飛泉湧出俄有赤為飛過真君曰時至矣其地為候時觀後攺赤鳥夀聖今曰廣福觀也真君至蛇所鄉民咸鼓譟趨前聽命乃卓劒布氣飛符召海昏社伯南昌社公并力驅蛇出穴其符落處因建觀名符落今南昌郡南太和觀是也蛇出穴舉首十餘丈吐毒衝天真君嘯命風雷指呼神兵令吳君飛步引劔劈其首施岑甘戰等揮劔裂腹有小蛇自腹出長數丈甘君欲斬之真君曰彼未為害不可妄誅小蛇奔七里聞鼓譟回顧其母弟子請追戮之真君曰此蛇五百年後若為民害吾當復出誅之以吾壇前松柏拂地為驗又曰吾仙去後一千二百四十年間豫章之境五陵之內當出地仙八百人其師出於豫章大揚吾教郡江心生沙洲掩過沙井口之時小蛇若為民害彼八百人自當誅之若無害於民亦不可誅也蛇子遂得入港今建昌有蛇子港七里聽新建有吳城廟是也真君既誅巨蟒妖血汙劔於是磨洗且削石以試其鋒今建昌州有冷水臺磨劒池試劔石存真君告弟子曰大蛇雖滅蛟精未誅彼物通靈必知吾有除害意恐其伺隙潰郡城盍濟郡乎戰岑二子者從我焉時求嘉六年真君道術髙妙著聞遠邇求為弟子者動以千計郤之不可得乃化炭為美婦人夜散君弟子處以試之明旦閲之其不為所染汚者惟十人爾即異時驂侍前後上升諸髙弟也自是凡周遊江湖誅斬蛟蛇無不從馬餘多自愧而去今建昌州西津名炭婦市其觀號妙明即其地也許大史真君圖傳卷上
